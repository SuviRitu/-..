<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>I'm Sorry Ritu</title>
<style>
body{margin:0;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(#05071c,#15153d,#3f0f3d);font-family:Arial}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(10px);padding:30px;border-radius:20px;text-align:center;color:#fff;z-index:2}
.float{position:absolute;animation:up linear infinite}@keyframes up{from{transform:translateY(100vh)}to{transform:translateY(-100px);opacity:0}}
</style></head>
<body>
<div class="card">
<div style="font-size:90px">🥺🐱</div>
<h1>I'm Sorry Ritu ❤️</h1>
<p>Every heartbeat whispers your name... Please forgive me.</p>
<button onclick="document.getElementById('letter').style.display='block'">💖 Forgive Me 💖</button>
<div id="letter" style="display:none;margin-top:15px">I'm truly sorry, Ritu. You mean more to me than words can express. 🌹</div>
</div>
<audio id="music" loop>
<source src="roi - videoclub instrumental (slowed version)-1856126830.mp3" type="audio/mpeg">
</audio>
<script>
document.body.addEventListener("click",()=>music.play(),{once:true});
setInterval(()=>{
let e=document.createElement("div");e.className="float";
e.innerHTML=["❤️","🌹","✨","💖"][Math.floor(Math.random()*4)];
e.style.left=Math.random()*100+"vw";
e.style.fontSize=(20+Math.random()*20)+"px";
e.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(e);
setTimeout(()=>e.remove(),8000);
},250);
</script>
</body></html>
